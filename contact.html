<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | INGENZI-Ledger</title>
    <style>
        body {
            background-color: #0f1711;
            color: #d2dde8;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .contact-container {
            background-color: #1a342d;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 1px solid #2d4137;
        }
        h1 {
            color: #4ade80;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        p {
            font-size: 1.1rem;
            margin-bottom: 30px;
            color: #b8d4c0;
        }
        .back-link {
            display: inline-block;
            text-decoration: none;
            color: #0f1711;
            background-color: #4ade80;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s;
        }
        .back-link:hover {
            background-color: #b8d4c0;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="contact-container">
        <h1>Contact Us</h1>
        <p>For support or inquiries, email us at:<br>
           <strong>support@fusiondev.com</strong>
        </p>
        <a href="index.html" class="back-link">← Back to Dashboard</a>
    </div>

</body>
</html>
